name: Nightly Lighthouse Check

on:
  schedule:
    - cron: "0 22 * * *"   # 22:00 UTC = 03:00 по Алматы (UTC+5) — ночью
  workflow_dispatch: {}     # ручной запуск из вкладки Actions

permissions:
  contents: read
  issues: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build Docker image
        run: docker build -t booking-service:ci .

      - name: Run container
        run: |
          docker run -d --name booking-service -p 3000:3000 -e PORT=3000 booking-service:ci
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/event-types && break
            sleep 2
          done

      - name: Run Lighthouse CI
        continue-on-error: true
        run: |
          npm install -g @lhci/cli
          lhci autorun \
            --collect.url=http://localhost:3000/ \
            --collect.url=http://localhost:3000/admin \
            --upload.target=temporary-public-storage

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci
          retention-days: 30

      - name: Stop container
        if: always()
        run: docker rm -f booking-service || true

      - name: Extract Lighthouse scores
        id: scores
        run: |
          node -e '
            const fs = require("fs");
            const manifest = JSON.parse(fs.readFileSync(".lighthouseci/manifest.json"));
            const links = JSON.parse(fs.readFileSync(".lighthouseci/links.json"));
            let body = "## Nightly Lighthouse Report\n\n";
            for (const run of manifest) {
              const cats = run.summary;
              body += `### ${run.url}\n`;
              for (const [key, val] of Object.entries(cats)) {
                const pct = Math.round(val * 100);
                const flag = pct < 90 ? " ⚠️" : "";
                body += `- ${key}: ${pct}${flag}\n`;
              }
              body += `- [Full report](${links[run.url]})\n\n`;
            }
            fs.writeFileSync("summary.md", body);
          '

      - name: Create report issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Nightly Lighthouse Report — $(date -u +%Y-%m-%d)" \
            --body-file summary.md \
            --repo ${{ github.repository }}
