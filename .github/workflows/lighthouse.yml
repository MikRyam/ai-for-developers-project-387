name: Nightly Lighthouse Check

on:
  schedule:
    - cron: "0 22 * * *"   # 22:00 UTC = 03:00 по Алматы (UTC+5) — ночью
  workflow_dispatch: {}     # ручной запуск из вкладки Actions

permissions:
  contents: read
  issues: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build Docker image
        run: docker build -t booking-service:ci .

      - name: Run container
        run: |
          docker run -d --name booking-service -p 3000:3000 -e PORT=3000 booking-service:ci
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/event-types && break
            sleep 2
          done

      - name: Run Lighthouse CI
        continue-on-error: true
        run: |
          npm install -g @lhci/cli
          lhci autorun \
            --collect.url=http://localhost:3000/ \
            --collect.url=http://localhost:3000/admin \
            --upload.target=temporary-public-storage \
            2>&1 | tee lhci-output.log

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            .lighthouseci
            lhci-output.log
          retention-days: 30

      - name: Stop container
        if: always()
        run: docker rm -f booking-service || true

      - name: Extract Lighthouse scores
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const dir = ".lighthouseci";
            const files = fs.readdirSync(dir).filter(f => f.startsWith("lhr-") && f.endsWith(".json"));

            const byUrl = {};
            for (const file of files) {
              const lhr = JSON.parse(fs.readFileSync(path.join(dir, file), "utf8"));
              (byUrl[lhr.finalUrl] ??= []).push(lhr.categories);
            }

            const log = fs.readFileSync("lhci-output.log", "utf8");
            const links = [...log.matchAll(/Open the report at (\S+)/g)].map(m => m[1]);

            let body = "## Nightly Lighthouse Report\n\n";
            for (const [url, runs] of Object.entries(byUrl)) {
              body += `### ${url}\n`;
              for (const key of Object.keys(runs[0])) {
                const avg = runs.reduce((sum, r) => sum + r[key].score, 0) / runs.length;
                const pct = Math.round(avg * 100);
                body += `- ${runs[0][key].title}: ${pct}${pct < 90 ? " ⚠️" : ""}\n`;
              }
              body += "\n";
            }
            if (links.length) {
              body += "**Полные HTML-отчёты (ссылка живёт ~7 дней):**\n";
              links.forEach(l => body += `- ${l}\n`);
            }
            fs.writeFileSync("summary.md", body);
          '

      - name: Create report issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Nightly Lighthouse Report — $(date -u +%Y-%m-%d)" \
            --body-file summary.md \
            --repo ${{ github.repository }}