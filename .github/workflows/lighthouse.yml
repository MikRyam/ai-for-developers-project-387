name: Nightly Lighthouse Check

on:
  schedule:
    - cron: "0 22 * * *"   # 22:00 UTC = 03:00 по Алматы (UTC+5) — ночью
  workflow_dispatch: {}     # ручной запуск из вкладки Actions

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build Docker image
        run: docker build -t booking-service:ci .

      - name: Run container
        run: |
          docker run -d --name booking-service -p 3000:3000 -e PORT=3000 booking-service:ci
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/event-types && break
            sleep 2
          done

      - name: Run Lighthouse CI
        continue-on-error: true
        run: |
          npm install -g @lhci/cli
          lhci autorun \
            --collect.url=http://localhost:3000/ \
            --collect.url=http://localhost:3000/admin \
            --upload.target=temporary-public-storage

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci
          retention-days: 30

      - name: Stop container
        if: always()
        run: docker rm -f booking-service || true

      - name: Summarize report with OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        with:
          model: deepseek/deepseek-v4-pro
          prompt: |
            Read the Lighthouse report at .lighthouseci/manifest.json and
            .lighthouseci/links.json (produced by lhci autorun in a previous
            step in this same job). Summarize Performance / Accessibility /
            Best Practices / SEO scores for each checked URL. Flag any score
            below 90. If you can find a previous issue titled "Nightly
            Lighthouse Report", compare against it and note regressions.
            Open a new GitHub issue titled "Nightly Lighthouse Report —
            <today's date>" with the summary and the temporary-public-storage
            report links from links.json. Keep it short if all scores are
            fine. Use Conventional Commits format for any commits you make.
